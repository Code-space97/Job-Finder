version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: job-matcher-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: jobmatcher
    volumes:
      - mongo_data:/data/db

  # Uncomment below to add mongo-express UI (optional)
  # mongo-express:
  #   image: mongo-express
  #   restart: unless-stopped
  #   ports:
  #     - "8081:8081"
  #   environment:
  #     ME_CONFIG_MONGODB_ADMINUSERNAME: admin
  #     ME_CONFIG_MONGODB_ADMINPASSWORD: secret
  #     ME_CONFIG_MONGODB_URL: mongodb://admin:secret@mongo:27017/

volumes:
  mongo_data:
